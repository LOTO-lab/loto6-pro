name: Update Loto 6 Data

on:
  schedule:
    # 毎週月曜日と木曜日の日本時間 20:30 (UTC 11:30) に実行
    - cron: '30 11 * * 1,4'
  workflow_dispatch: # 手動実行用

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run update script
        run: |
          python auto_updater.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add loto6_data.csv loto6_data_with_setball.csv index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Latest Loto 6 results" && git push)
