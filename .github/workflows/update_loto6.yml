name: Update Loto 6 Data

on:
  schedule:
    # 毎週月曜日と木曜日の日本時間 19:20 (UTC 10:20) に実行開始
    - cron: '20 10 * * 1,4'
  workflow_dispatch: # 手動実行用

jobs:
  update-data:
    runs-on: ubuntu-latest
    # 【ここを追加】ファイルを書き換えて保存するための許可設定
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run update script
        run: |
          python auto_updater.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 書き出し先のファイルをすべて追加
          git add loto6_data_with_setball.csv lotoData.json loto6_data.js index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Latest Loto 6 results and prize counts" && git push)
