name: Update Loto 6 Data

on:
  schedule:
    # 毎週 月曜・木曜の日本時間 19:20 に実行（UTC 10:20）
    - cron: '20 10 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Validate required secrets
        env:
          LOTO6_SOURCE_URL: ${{ secrets.LOTO6_SOURCE_URL }}
        run: |
          if [ -z "$LOTO6_SOURCE_URL" ]; then
            echo "::error::LOTO6_SOURCE_URL repository secret is not configured."
            exit 1
          fi

      - name: Run update script
        env:
          LOTO6_SOURCE_URL: ${{ secrets.LOTO6_SOURCE_URL }}
        run: |
          python auto_updater.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add loto6_data_with_setball.csv lotoData.json loto6_data.js index.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: Latest Loto 6 results and prize counts"
            git push
          fi
