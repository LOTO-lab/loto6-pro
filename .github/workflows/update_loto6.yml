name: Update Loto 6 Data

on:
  schedule:
    # Monday and Thursday 19:20 JST (10:20 UTC)
    - cron: '20 10 * * 1,4'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 260
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Validate required secrets
        env:
          LOTO6_SOURCE_URL: ${{ secrets.LOTO6_SOURCE_URL }}
        run: |
          if [ -z "$LOTO6_SOURCE_URL" ]; then
            echo "::error::LOTO6_SOURCE_URL repository secret is not configured."
            exit 1
          fi

      - name: Run update script
        timeout-minutes: 250
        env:
          PYTHONUNBUFFERED: "1"
          LOTO6_SOURCE_URL: ${{ secrets.LOTO6_SOURCE_URL }}
          LOTO6_MAX_RETRIES: "8"
          LOTO6_RETRY_INTERVAL_SECONDS: "1800"
        run: |
          python -u auto_updater.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add loto6_data_with_setball.csv lotoData.json loto6_data.js index.html insight-pro
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Latest Loto 6 results and prize counts" && git push)
